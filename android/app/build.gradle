plugins {
    id 'com.android.application'
}

android {
    namespace 'com.cronograma.ia'
    compileSdk 34

    defaultConfig {
        applicationId "com.cronograma.ia"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
